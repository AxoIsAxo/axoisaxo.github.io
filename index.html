<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Website</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin: 20px;
        }

        #userDisplay {
            background-color: #eee;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        form {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        button {
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="userDisplay"></div>
    
    <!-- Benutzerregistrierung -->
    <h2>Registrieren</h2>
    <form id="registrationForm">
        <label for="regUsername">Benutzername:</label>
        <input type="text" id="regUsername" required>
        <br>
        <label for="regPassword">Passwort:</label>
        <input type="password" id="regPassword" required>
        <br>
        <button type="button" onclick="registerUser()">Registrieren</button>
    </form>

    <!-- Benutzeranmeldung -->
    <h2>Anmelden</h2>
    <form id="loginForm">
        <label for="loginUsername">Benutzername:</label>
        <input type="text" id="loginUsername" required>
        <br>
        <label for="loginPassword">Passwort:</label>
        <input type="password" id="loginPassword" required>
        <br>
        <button type="button" onclick="loginUser()">Anmelden</button>
        <button type="button" onclick="openAccountSettings()">Account</button>
    </form>

    <script>
        const users = JSON.parse(localStorage.getItem('users')) || {};
        const userDisplay = document.getElementById('userDisplay');

        // Versuche, einen angemeldeten Benutzer anzuzeigen, wenn die Seite geladen wird
        displayLoggedInUser();

        function saveUsers() {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function registerUser() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;

            if (!users[username]) {
                users[username] = { password: password };
                saveUsers();
                alert('Registrierung erfolgreich!');
                displayLoggedInUser();
            } else {
                alert('Benutzername bereits vergeben. Bitte wähle einen anderen.');
            }
        }

        function loginUser() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (users[username] && users[username].password === password) {
                displayUser(username);
                alert('Anmeldung erfolgreich!');
            } else {
                alert('Falscher Benutzername oder Passwort.');
            }
        }

        function displayUser(username) {
            userDisplay.textContent = `Angemeldet als: ${username}`;
            localStorage.setItem('loggedInUser', username);
        }

        function displayLoggedInUser() {
            const loggedInUser = getLoggedInUser();
            if (loggedInUser) {
                displayUser(loggedInUser);
            }
        }

        function getLoggedInUser() {
            return localStorage.getItem('loggedInUser');
        }

        function openAccountSettings() {
            // Weiterleitung zur Seite mit den Account-Einstellungen
            window.location.href = 'accountsettings.html';
        }
    </script>
</body>
</html>
