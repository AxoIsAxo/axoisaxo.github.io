<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierte Benutzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #userList {
            list-style-type: none;
            padding: 0;
        }

        #userList li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Registrierte Benutzer</h1>
    <ul id="userList"></ul>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            displayUserList();
        });

        function displayUserList() {
            const userList = getUserListFromLocalStorage();

            if (userList.length > 0) {
                const userListElement = document.getElementById('userList');
                userListElement.innerHTML = userList.map(username => `<li>${username}</li>`).join('');
            } else {
                console.error('Keine registrierten Benutzer gefunden.');
            }
        }

        function getUserListFromLocalStorage() {
            try {
                const userList = JSON.parse(localStorage.getItem('userList')) || [];
                return userList;
            } catch (error) {
                console.error('Fehler beim Abrufen der Benutzerliste:', error);
                return [];
            }
        }
    </script>
</body>
</html>
