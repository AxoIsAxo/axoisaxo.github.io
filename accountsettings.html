<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account-Einstellungen</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin: 20px;
        }

        #userDisplay {
            background-color: #eee;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Account-Einstellungen</h1>
    <div id="userDisplay"></div>
    
    <button onclick="goBack()">Zurück</button>

    <script>
        // Versuche, einen angemeldeten Benutzer anzuzeigen, wenn die Seite geladen wird
        displayLoggedInUser();

        function displayUser(username) {
            const userDisplay = document.getElementById('userDisplay');
            userDisplay.textContent = `Angemeldet als: ${username}`;
        }

        function displayLoggedInUser() {
            const loggedInUser = getLoggedInUser();
            if (loggedInUser) {
                displayUser(loggedInUser);
            }
        }

        function getLoggedInUser() {
            return localStorage.getItem('loggedInUser');
        }

        function goBack() {
            // Navigation zur vorherigen Seite (index.html)
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
